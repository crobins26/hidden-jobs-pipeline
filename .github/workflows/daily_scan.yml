name: Daily Hidden Jobs Scan

on:
  schedule:
    - cron: "30 11 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check Central time
        id: central_time
        shell: bash
        run: |
          LOCAL_HOUR=$(TZ=America/Chicago date +%H)
          LOCAL_TIME=$(TZ=America/Chicago date +%H:%M)

          echo "Central time at workflow start: $LOCAL_TIME"
          echo "local_hour=$LOCAL_HOUR" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_HOUR" = "06" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
            echo "Scan approved."
          else
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            echo "This is the daylight-saving duplicate run, so the scan will be skipped."
          fi

      - name: Check out repository
        if: steps.central_time.outputs.run_scan == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.central_time.outputs.run_scan == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Scan public company career boards
        if: steps.central_time.outputs.run_scan == 'true'
        run: python scripts/scan_jobs.py

      - name: Commit refreshed feed
        if: steps.central_time.outputs.run_scan == 'true'
        shell: bash
        run: |
          git config user.name "hidden-jobs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/jobs.json

          if git diff --cached --quiet; then
            echo "No job-feed changes to commit."
          else
            git commit -m "Refresh hidden jobs feed"
            git push
          fi
