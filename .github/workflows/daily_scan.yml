name: Daily Hidden Jobs Scan

on:
  schedule:
    - cron: "30 11 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check Central time
        id: central_time
        shell: bash
        run: |
          LOCAL_HOUR=$(TZ=America/Chicago date +%H)
          LOCAL_TIME=$(TZ=America/Chicago date +%H:%M)

          echo "Central time at workflow start: $LOCAL_TIME"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$LOCAL_HOUR" = "06" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
            echo "Scan approved."
          else
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            echo "Duplicate daylight-saving run skipped."
          fi

      - name: Check out repository
        if: steps.central_time.outputs.run_scan == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.central_time.outputs.run_scan == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate required files
        if: steps.central_time.outputs.run_scan == 'true'
        shell: bash
        run: |
          test -f scripts/scan_jobs.py
          test -f data/search_config.json
          test -f data/candidate_profile.json
          test -f data/company_sources.csv
          echo "Required scanner files are present."

      - name: Scan public company career boards
        if: steps.central_time.outputs.run_scan == 'true'
        env:
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
        run: python scripts/scan_jobs.py

      - name: Show scan summary
        if: steps.central_time.outputs.run_scan == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path("data/jobs.json").read_text())
          print("Updated:",data.get("updated_at"))
          print("Matches:",data.get("match_count"))
          print("Broad search enabled:",data.get("broad_search_enabled"))
          errors=data.get("errors") or []
          if errors:
              print("Warnings:")
              for item in errors[:10]:
                  print("-",item)
          PY

      - name: Commit refreshed feed
        if: steps.central_time.outputs.run_scan == 'true'
        shell: bash
        run: |
          git config user.name "hidden-jobs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/jobs.json

          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Refresh hidden jobs feed"
            git push
          fi
