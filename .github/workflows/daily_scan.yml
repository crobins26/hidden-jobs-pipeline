name: Daily Hidden Jobs Scan

on:
  schedule:
    - cron: "30 11 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hidden-jobs-daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Select correct Central-time schedule
        id: schedule_gate
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          TRIGGER_SCHEDULE="${{ github.event.schedule }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
            echo "Manual run approved."
            exit 0
          fi

          CHICAGO_OFFSET=$(TZ=America/Chicago date +%z)
          echo "Chicago UTC offset: $CHICAGO_OFFSET"
          echo "Trigger schedule: $TRIGGER_SCHEDULE"

          if [ "$CHICAGO_OFFSET" = "-0500" ] && [ "$TRIGGER_SCHEDULE" = "30 11 * * *" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
            echo "Approved daylight-time schedule."
          elif [ "$CHICAGO_OFFSET" = "-0600" ] && [ "$TRIGGER_SCHEDULE" = "30 12 * * *" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
            echo "Approved standard-time schedule."
          else
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            echo "Duplicate seasonal schedule skipped."
          fi

      - name: Check out repository
        if: steps.schedule_gate.outputs.run_scan == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.schedule_gate.outputs.run_scan == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate required files
        if: steps.schedule_gate.outputs.run_scan == 'true'
        shell: bash
        run: |
          test -f scripts/scan_jobs.py
          test -f data/search_config.json
          test -f data/candidate_profile.json
          test -f data/company_sources.csv
          echo "Required scanner files are present."

      - name: Scan public company career boards
        if: steps.schedule_gate.outputs.run_scan == 'true'
        env:
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
        run: python scripts/scan_jobs.py

      - name: Show scan summary
        if: steps.schedule_gate.outputs.run_scan == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path("data/jobs.json").read_text())
          print("Updated:", data.get("updated_at"))
          print("Matches:", data.get("match_count"))
          print("Broad search enabled:", data.get("broad_search_enabled"))
          errors=data.get("errors") or []
          if errors:
              print("Warnings:")
              for item in errors[:10]:
                  print("-", item)
          PY

      - name: Commit refreshed feed
        if: steps.schedule_gate.outputs.run_scan == 'true'
        shell: bash
        run: |
          git config user.name "hidden-jobs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/jobs.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Refresh hidden jobs feed"
            git push
          fi
